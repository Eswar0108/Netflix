name: Validate static site

on:
  pull_request:
  push:
    branches: ['main', 'work']

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: node --check script.js

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          test -f .github/workflows/deploy.yml
          test -f .nojekyll

      - name: Smoke test local static server
        run: |
          python3 -m http.server 8000 >/tmp/netflix-validate.log 2>&1 &
          SERVER_PID=$!
          sleep 2
          curl -I http://127.0.0.1:8000/index.html
          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
